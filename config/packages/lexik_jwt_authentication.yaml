lexik_jwt_authentication:
    secret_key: '%env(resolve:JWT_SECRET_KEY)%'
    public_key: '%env(resolve:JWT_PUBLIC_KEY)%'
    pass_phrase: '%env(JWT_PASSPHRASE)%'
    token_ttl: 3600

    token_extractors:
        cookie:
            name: BEARER

    set_cookies:
        BEARER:
            lifetime: null
            samesite: strict
            secure: true #false si http (local)
            httpOnly: true
